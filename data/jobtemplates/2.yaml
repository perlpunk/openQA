defaults:
  ppc64le:
    machine: ppc64le
    priority: 50
  x86_64:
    machine: 64bit
    priority: 50
products:
  microos-*-Staging-DVD-x86_64:
    distri: microos
    flavor: Staging-DVD
    version: '*'
  microos-*-Staging-Kubic-DVD-x86_64:
    distri: microos
    flavor: Staging-Kubic-DVD
    version: '*'
  opensuse-*-Staging-DVD-x86_64:
    distri: opensuse
    flavor: Staging-DVD
    version: '*'
  opensuse-Core-Staging-DVD-ppc64le:
    distri: opensuse
    flavor: Staging-DVD
    version: Core
  opensuse-Core-Staging-DVD-x86_64:
    distri: opensuse
    flavor: Staging-DVD
    version: Core
scenarios:
  ppc64le:
    opensuse-Core-Staging-DVD-ppc64le:
    - minimalx
    - rescue_system
  x86_64:
    microos-*-Staging-DVD-x86_64:
    - microos:
        machine: uefi-staging
    - container-host:
        machine: 64bit-2G-HD40G
    microos-*-Staging-Kubic-DVD-x86_64:
    - kubeadm:
        machine: 64bit-2G-HD40G
    - container-host:
        machine: uefi-staging
    opensuse-*-Staging-DVD-x86_64:
    - textmode:
        machine: 64bit
    - kde:
        machine: 64bit
        priority: 45
    - kde:
        machine: USBboot_64
        priority: 45
    - gnome:
        machine: 64bit
        priority: 45
    - minimalx:
        machine: 64bit
        priority: 45
    - minimalx:
        machine: uefi-staging
        priority: 45
    - cryptlvm:
        machine: 64bit
    - rescue_system:
        machine: 64bit
    - upgrade_staging:
        machine: 64bit
    - autoyast_mini
    - RAID0_gpt
    - RAID1_gpt:
        machine: 64bit
    opensuse-Core-Staging-DVD-x86_64:
    - textmode:
        machine: 64bit
    - kde:
        machine: 64bit
        priority: 45
    - gnome:
        machine: 64bit
        priority: 45
    - minimalx:
        machine: 64bit
    - cryptlvm:
        machine: 64bit
    - rescue_system:
        machine: 64bit
    - upgrade_staging:
        machine: 64bit
    - create_hdd_kde
    - lvm+RAID1
    - RAID1_gpt:
        machine: 64bit

